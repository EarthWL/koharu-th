name: Test

on:
  push:
    # `arch/v2-foundation` is the long-lived v2 refactor branch
    # (4-5 month build). Catch regressions on every push. Ubuntu-only
    # workflow — no macOS-minutes (10× billing) concern.
    branches: ['main', 'arch/v2-foundation']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      # refer: https://v2.tauri.app/start/prerequisites/#linux
      - run: |
          sudo apt update
          sudo apt install libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            fonts-noto-cjk
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
      - run: cargo test --no-run
      - run: cargo test --workspace --tests
