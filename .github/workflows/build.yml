name: Build

on:
  push:
    branches: ['main', 'feat/ux-improvements']
    paths-ignore:
      - '**.md'
      - '.git*'
      - 'docs/**'
      - 'assets/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.git*'
      - 'docs/**'
      - 'assets/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Set to a single compute capability (80 for Ampere/A100 and newer compat)
  # to avoid bindgen_cuda ParseIntError panic on Windows/Linux in CI.
  CUDA_COMPUTE_CAP: "80"

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: Swatinem/rust-cache@v2
      - uses: Jimver/cuda-toolkit@master
        if: matrix.os != 'macos-latest'
        with:
          cuda: '12.8.0'
      - uses: ilammy/msvc-dev-cmd@v1
        if: matrix.os == 'windows-latest'
      - run: bun install
      # `--features cuda` enables candle + cudarc CUDA kernels at compile
      # time. Without it, `cfg!(feature = "cuda")` is false and the
      # runtime device picker (`cuda_is_available()` in koharu-ml/src/lib.rs)
      # short-circuits to CPU even on machines with a working RTX driver.
      - run: bun tauri build --no-bundle --features cuda
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: koharu-${{ matrix.os }}
          path: |
            target/release/koharu*
          retention-days: 3
